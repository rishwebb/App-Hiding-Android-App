  </text>
  <text x="72" y="408" fill="#EAF9FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">
    hidden-app vault, and persistent home state.
  </text>

  <g>
    <rect x="72" y="462" width="154" height="46" rx="23" fill="#FFFFFF" fill-opacity="0.22"/>
    <text x="149" y="491" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Android 12+</text>

    <rect x="238" y="462" width="190" height="46" rx="23" fill="#FFFFFF" fill-opacity="0.18"/>
    <text x="333" y="491" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Jetpack Compose</text>

    <rect x="440" y="462" width="104" height="46" rx="23" fill="#FFFFFF" fill-opacity="0.18"/>
    <text x="492" y="491" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Room</text>
  </g>

  <g>
    <rect x="72" y="560" width="560" height="92" rx="24" fill="#0A1630" fill-opacity="0.14" stroke="#FFFFFF" stroke-opacity="0.20"/>
