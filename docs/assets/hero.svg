<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="67" y1="52" x2="1151" y2="689" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7FE8D1"/>
      <stop offset="0.34" stop-color="#22C9E7"/>
      <stop offset="0.68" stop-color="#308BFF"/>
      <stop offset="1" stop-color="#5A64F7"/>
    </linearGradient>
    <linearGradient id="card" x1="817" y1="106" x2="1112" y2="617" gradientUnits="userSpaceOnUse">
      <stop stop-color="#132B59" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#091221" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="blurA" x="-150" y="-150" width="600" height="600" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="75"/>
    </filter>
    <filter id="shadow" x="740" y="54" width="444" height="628" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#05111F" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>
  <circle cx="152" cy="131" r="120" fill="#FFFFFF" fill-opacity="0.16" filter="url(#blurA)"/>
  <circle cx="1224" cy="95" r="96" fill="#FFFFFF" fill-opacity="0.11"/>
  <circle cx="1115" cy="624" r="140" fill="#FFFFFF" fill-opacity="0.08"/>

  <g opacity="0.94">
    <rect x="72" y="88" width="108" height="108" rx="28" fill="#0A2A66" fill-opacity="0.2"/>
    <g fill="#39C4FF">
      <circle cx="111" cy="127" r="13"/>
      <circle cx="164" cy="127" r="13"/>
      <circle cx="111" cy="181" r="13"/>
      <circle cx="164" cy="181" r="13"/>
    </g>
  </g>

  <text x="72" y="278" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="700">LauncherX</text>
  <text x="72" y="332" fill="#EAF9FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">
    Compose-built Android launcher with
  </text>
  <text x="72" y="370" fill="#EAF9FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">
