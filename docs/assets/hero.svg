    <rect x="798" y="106" width="328" height="510" rx="34" fill="url(#card)"/>
    <rect x="910" y="121" width="105" height="14" rx="7" fill="#FFFFFF" fill-opacity="0.20"/>

    <text x="962" y="208" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="600">9:41</text>
    <text x="962" y="235" text-anchor="middle" fill="#D5EFFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Fri, Mar 14</text>
    <text x="962" y="260" text-anchor="middle" fill="#BCEBFF" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500">26°  Clear</text>

    <rect x="834" y="296" width="96" height="96" rx="26" fill="url(#glass)"/>
    <rect x="946" y="296" width="96" height="96" rx="26" fill="url(#glass)"/>
    <rect x="834" y="408" width="96" height="96" rx="26" fill="url(#glass)"/>
    <rect x="946" y="408" width="96" height="96" rx="26" fill="url(#glass)"/>

    <circle cx="882" cy="344" r="24" fill="#4CB8FF"/>
    <circle cx="994" cy="344" r="24" fill="#44D6C4"/>
    <circle cx="882" cy="456" r="24" fill="#7286FF"/>
    <circle cx="994" cy="456" r="24" fill="#50C1FF"/>

    <rect x="828" y="530" width="268" height="58" rx="28" fill="#FFFFFF" fill-opacity="0.15" stroke="#FFFFFF" stroke-opacity="0.24"/>
    <circle cx="874" cy="559" r="18" fill="#57B9FF"/>
    <circle cx="934" cy="559" r="18" fill="#4CE4B6"/>
    <circle cx="994" cy="559" r="18" fill="#FFFFFF" fill-opacity="0.88"/>
    <circle cx="1054" cy="559" r="18" fill="#7C8CFF"/>
  </g>

  <g>
    <rect x="1042" y="160" width="170" height="72" rx="22" fill="#FFFFFF" fill-opacity="0.18"/>
    <text x="1064" y="188" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Hidden Vault</text>
    <text x="1064" y="212" fill="#EAF9FF" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">PIN + biometric access</text>
  </g>
